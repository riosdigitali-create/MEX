<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MÉXICO HÉROES · vs LOS ROBOTS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{ --neon:#ff2e88; --neon2:#00e5ff; --gold:#ffcf1a; --verde:#1f9e4d; --rojo:#e0342a; }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:#050109; min-height:100%;}
  body{
    font-family:'Press Start 2P', monospace;
    display:flex; flex-direction:column; align-items:center;
    padding:10px 10px 22px; color:#fff;
    background:radial-gradient(circle at 50% -10%, #2a0f3d 0%, #0b0616 55%, #050109 100%);
  }
  .cabinet{
    width:min(760px,100%);
    background:linear-gradient(#241033,#160a24);
    border:4px solid #3a1e57; border-radius:26px 26px 18px 18px;
    padding:14px 14px 20px;
    box-shadow:0 0 0 3px #0a0414, 0 22px 60px rgba(0,0,0,.7), inset 0 0 40px rgba(255,46,136,.08);
  }
  .marquee{
    text-align:center; padding:12px 6px 14px; line-height:1.7;
    font-size:clamp(11px,3.2vw,18px); color:#fff;
    text-shadow:0 0 6px var(--verde),0 0 14px var(--rojo); letter-spacing:1px;
  }
  .marquee small{
    display:block; margin-top:10px; font-size:clamp(6px,1.7vw,9px);
    color:var(--gold); text-shadow:0 0 6px var(--gold); letter-spacing:2px;
  }
  .screen-bezel{ background:#000; border-radius:16px; padding:12px; border:3px solid #4a2a6a;
    box-shadow:inset 0 0 24px #000, 0 0 22px rgba(0,229,255,.15);}
  .screen{ position:relative; border-radius:10px; overflow:hidden; background:#0a0420; }
  #game{ display:block; width:100%; height:auto; image-rendering:pixelated; touch-action:none; cursor:crosshair;}
  .scanlines{ pointer-events:none; position:absolute; inset:0; border-radius:10px;
    background:repeating-linear-gradient(rgba(0,0,0,0) 0 2px, rgba(0,0,0,.16) 2px 3px); mix-blend-mode:multiply;}
  .glass{ pointer-events:none; position:absolute; inset:0; border-radius:10px;
    background:radial-gradient(120% 90% at 50% 0%, rgba(255,255,255,.09), transparent 55%);}
  /* comic overlay */
  .comic{ position:absolute; inset:0; background:rgba(4,2,10,.92); border-radius:10px;
    display:none; flex-direction:column; align-items:center; justify-content:center; padding:14px; z-index:6;}
  .comic.show{ display:flex; }
  .comic .cimg{ max-width:70%; max-height:74%; border:3px solid var(--gold); border-radius:6px;
    box-shadow:0 0 26px rgba(255,207,26,.4); image-rendering:auto;}
  .comic .ctitle{ font-size:9px; color:var(--gold); text-shadow:0 0 8px var(--gold); margin-bottom:10px; text-align:center; letter-spacing:1px;}
  .comic .crow{ display:flex; gap:12px; margin-top:14px;}
  .comic button{ font-family:inherit; font-size:8px; color:#2a0016; cursor:pointer; padding:9px 12px; border:none; border-radius:8px;
    background:radial-gradient(circle at 40% 30%, #ffe08a, var(--gold) 55%, #b8890a); box-shadow:0 5px 0 #7a5a06;}
  .comic button.alt{ background:radial-gradient(circle at 40% 30%, #9fe6ff, var(--neon2) 55%, #0a7f96); box-shadow:0 5px 0 #075867; color:#012;}
  .comic .cdot{ font-size:7px; color:#9a86c0; margin-top:10px; letter-spacing:2px;}
  .now-playing{ text-align:center; font-size:9px; color:var(--gold); margin:12px 0 4px; text-shadow:0 0 8px var(--gold); letter-spacing:1px; min-height:11px;}
  .roster{ display:flex; gap:8px; justify-content:center; margin:10px 0 4px; flex-wrap:wrap;}
  .hero-card{ background:#1c0f2b; border:2px solid #3a1e57; border-radius:10px; padding:8px 6px 6px; width:150px; cursor:pointer; text-align:center; transition:.12s; color:#c9b6e6;}
  .hero-card canvas{ image-rendering:pixelated; width:64px; height:80px; display:block; margin:0 auto 4px;}
  .hero-card img.hicon{ width:auto; height:82px; max-width:100px; display:block; margin:0 auto 4px; object-fit:contain; filter:drop-shadow(0 2px 3px rgba(0,0,0,.55)); image-rendering:auto;}
  .hero-card .nm{ font-size:6.5px; line-height:1.5; letter-spacing:.5px;}
  .hero-card .key{ font-size:6px; color:#6c5a86; margin-top:3px;}
  .hero-card:hover{ border-color:var(--neon2);}
  .hero-card.active{ border-color:var(--verde); color:#fff; box-shadow:0 0 14px rgba(31,158,77,.7); background:#12331f;}
  .panel{ margin-top:14px; background:linear-gradient(#2a1640,#1a0d2a); border:3px solid #3a1e57; border-radius:16px; padding:16px;
    display:flex; align-items:center; justify-content:center; gap:40px; box-shadow:inset 0 3px 0 #4a2a6a, inset 0 -6px 14px rgba(0,0,0,.4);}
  .stick-wrap{ text-align:center; }
  .joybase{ width:120px; height:120px; border-radius:50%; background:radial-gradient(circle at 50% 35%, #3a2456, #140a20);
    border:4px solid #0c0616; position:relative; touch-action:none; box-shadow:inset 0 6px 14px rgba(0,0,0,.6), 0 4px 10px rgba(0,0,0,.5); cursor:grab;}
  .joyknob{ width:56px; height:56px; border-radius:50%; position:absolute; left:50%; top:50%; margin:-28px 0 0 -28px;
    background:radial-gradient(circle at 40% 30%, #7ef0a6, var(--verde) 55%, #0d5b2c);
    box-shadow:0 6px 10px rgba(0,0,0,.5), inset 0 -6px 10px rgba(0,0,0,.35), 0 0 18px rgba(31,158,77,.6); transition:transform .04s linear;}
  .ctrl-label{ font-size:7px; color:#8a76a8; margin-top:8px; letter-spacing:1px;}
  .btn-wrap{ display:flex; flex-direction:row; gap:16px; align-items:center;}
  .abtn{ font-family:inherit; font-size:9px; color:#3a0016; cursor:pointer; width:88px; height:88px; border-radius:50%; border:none;
    background:radial-gradient(circle at 40% 30%, #ffe08a, var(--gold) 55%, #b8890a); box-shadow:0 8px 0 #7a5a06, 0 10px 16px rgba(0,0,0,.5); transition:.05s; user-select:none;}
  .abtn:active{ transform:translateY(6px); box-shadow:0 2px 0 #7a5a06;}
  .abtn.small{ width:60px; height:60px; font-size:7px; background:radial-gradient(circle at 40% 30%, #9fe6ff, var(--neon2) 55%, #0a7f96); box-shadow:0 7px 0 #075867, 0 9px 14px rgba(0,0,0,.5); color:#012;}
  .abtn.small:active{ transform:translateY(5px); box-shadow:0 2px 0 #075867;}
  .hint{ text-align:center; font-size:7px; color:#7a6a94; margin-top:16px; line-height:2; letter-spacing:1px;}
  .hint b{ color:var(--neon2);}
  .snd{ position:absolute; top:8px; right:8px; z-index:7; font-size:13px; line-height:1; background:rgba(0,0,0,.45); border:2px solid #4a2a6a; color:#fff; border-radius:8px; width:32px; height:28px; cursor:pointer; padding:0;}
  @media(max-width:560px){ .panel{ flex-wrap:wrap; justify-content:center;} .hero-card{ width:110px;} .comic .cimg{max-width:88%;} }
</style>
</head>
<body>
<div class="cabinet">
  <div class="marquee">
    ★ MÉXICO HÉROES · vs LOS ROBOTS ★
    <small>TEPITO · EL ÁNGEL · LAS PIRÁMIDES — DEFIENDE MÉXICO</small>
  </div>

  <div class="screen-bezel">
    <div class="screen">
      <canvas id="game" width="640" height="360"></canvas>
      <div class="scanlines"></div>
      <div class="glass"></div>
      <button id="sndBtn" class="snd" title="Sonido">🔊</button>
      <div class="comic" id="comic">
        <div class="ctitle" id="comicTitle">CÓMIC</div>
        <img class="cimg" id="comicImg" alt="cómic">
        <div class="cdot" id="comicDot"></div>
        <div class="crow">
          <button class="alt" id="comicPrev">◀ ANTERIOR</button>
          <button id="comicNext">SIGUIENTE ▶</button>
        </div>
      </div>
    </div>
  </div>

  <div class="now-playing" id="nowPlaying">JUGANDO: —</div>

  <div class="roster" id="roster"></div>

  <div class="panel">
    <div class="stick-wrap">
      <div class="joybase" id="joybase"><div class="joyknob" id="joyknob"></div></div>
      <div class="ctrl-label">PALANCA</div>
    </div>
    <div class="btn-wrap">
      <button class="abtn small" id="atkBtn">GOLPEAR</button>
      <button class="abtn" id="jumpBtn">SALTO</button>
    </div>
  </div>

  <div class="hint">
    PALANCA / FLECHAS ← → : caminar &nbsp;·&nbsp; ARRIBA o <b>SALTO</b> : brincar<br>
    <b>GOLPEAR</b> (tecla X) o toca un robot : atacar &nbsp;·&nbsp; teclas <b>1 2 3</b> o las tarjetas : cambiar de héroe
  </div>
</div>

<script>
(function(){
  const cv = document.getElementById('game');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  const GROUND = 300;
  ctx.imageSmoothingEnabled = false;

  // ====== AUDIO (Web Audio, sin archivos) ======
  let AC=null, master=null, musicOn=true, sfxOn=true, musicTimer=null, mstep=0;
  function initAudio(){ if(AC) return; try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
    master=AC.createGain(); master.gain.value=0.5; master.connect(AC.destination); startMusic(); }
  function beep(freq,dur,type,vol,when){ if(!AC) return; const t=when||AC.currentTime; const o=AC.createOscillator(), g=AC.createGain();
    o.type=type||'square'; o.frequency.setValueAtTime(freq,t); g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(vol||0.2,t+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+0.03); }
  function noise(dur,vol){ if(!AC) return; const n=Math.floor(AC.sampleRate*dur), b=AC.createBuffer(1,n,AC.sampleRate), d=b.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,2); const s=AC.createBufferSource(); s.buffer=b; const g=AC.createGain(); g.gain.value=vol||0.2; s.connect(g); g.connect(master); s.start(); }
  function sfx(type){ if(!AC||!sfxOn) return; const t=AC.currentTime;
    if(type==='jump'){ beep(420,0.1,'square',0.18); beep(720,0.09,'square',0.13,t+0.05); }
    else if(type==='hit'){ noise(0.1,0.25); beep(170,0.09,'sawtooth',0.2); }
    else if(type==='defeat'){ beep(300,0.08,'square',0.2); beep(200,0.09,'square',0.18,t+0.08); beep(120,0.14,'square',0.16,t+0.17); }
    else if(type==='coin'){ beep(880,0.05,'square',0.15); beep(1320,0.08,'square',0.15,t+0.05); }
    else if(type==='hurt'){ beep(160,0.16,'sawtooth',0.22); beep(90,0.18,'sawtooth',0.2,t+0.07); }
    else if(type==='comic'){ beep(523,0.11,'triangle',0.18); beep(659,0.11,'triangle',0.18,t+0.1); beep(784,0.18,'triangle',0.18,t+0.2); }
    else if(type==='win'){ [523,659,784,1047].forEach((f,i)=>beep(f,0.18,'square',0.2,t+i*0.12)); } }
  const BASS=[196,196,262,220], MEL=[0,3,7,5,3,7,10,7];
  function startMusic(){ if(!AC||musicTimer) return;
    musicTimer=setInterval(function(){ if(!AC||!musicOn) return; const t=AC.currentTime;
      const f=196*Math.pow(2,MEL[mstep%MEL.length]/12); beep(f,0.16,'square',0.05,t);
      if(mstep%2===0){ beep(BASS[(mstep/2)%BASS.length]/2,0.22,'triangle',0.07,t); }
      mstep++; }, 210); }
  function ensureAudio(){ initAudio(); if(AC && AC.state==='suspended') AC.resume(); }
  window.addEventListener('pointerdown', ensureAudio);
  window.addEventListener('keydown', ensureAudio);


  /* ============ SPRITES PIXEL-ART DE HÉROES ============
     Bloques [gx,gy,gw,gh,color] en rejilla 16x24 (y=24 = pies).
     eyes: rects de ojos (para el parpadeo se pintan con skin). */

    return { skin:SK,
      cape:[[3,9,10,9,C],[3,17,10,3,CD]],

      legR:[[9,14,2,6,WH],[9,20,3,4,BO]],

        [5,3,6,5,SK],[4,3,8,2,M],[5,4,2,1,'#fff'],[9,4,2,1,'#fff'],
        [7,6,2,1,LP],[7,8,2,1,SK],

        [4,1,8,4,N],[4,1,8,1,P],[5,3,2,1,EY],[9,3,2,1,EY],[7,4,2,2,BK],
        [4,5,8,1,B],[4,6,8,7,N],[6,8,4,1,P],[7,9,2,1,P],

  function drawChar(g, parts, cx, footY, s, facing, t, walkPhase, moving, blinking){
    const GH = 24;
    g.save(); g.translate(cx, footY); g.scale(facing, 1);
    const bob = moving ? 0 : Math.sin(t*2.6)*1.1*s;
    const sway = Math.sin(t*1.8)*1.4*s;
    function paint(blocks, ox, oy){
      for(const b of blocks){
        g.fillStyle = b[4];
        g.fillRect(Math.round((b[0]-8)*s+ox), Math.round((b[1]-GH)*s+oy), Math.ceil(b[2]*s), Math.ceil(b[3]*s));
      }
    }
    paint(parts.cape, sway*0.4, bob*0.6);
    let sxL=0,sxR=0,lyL=0,lyR=0;
    if(moving){ const sw=Math.sin(walkPhase); sxL=sw*2*s; sxR=-sw*2*s; lyL=-Math.max(0,sw)*2.2*s; lyR=-Math.max(0,-sw)*2.2*s; }
    paint(parts.legL, sxL, lyL);
    paint(parts.legR, sxR, lyR);
    paint(parts.body, 0, bob);
    // PARPADEO: pinta los ojos con color piel un instante
    if(blinking && parts.eyes){
      const sk = parts.eyeSkin || parts.skin;
      const eb = parts.eyes.map(e=>[e[0],e[1],e[2],e[3],sk]);
      paint(eb, 0, bob);
    }
    g.restore();
  }

  /* retratos del selector */
  const roster = document.getElementById('roster'); const cards = [];
  CHARS.forEach((c,i)=>{

    const pic=document.createElement('img'); pic.className='hicon'; pic.src=c.photo; pic.alt=c.name;
    card.appendChild(pic);
    const nm=document.createElement('div'); nm.className='nm'; nm.textContent=c.name;
    const ky=document.createElement('div'); ky.className='key'; ky.textContent='TECLA '+(i+1);
    card.appendChild(nm); card.appendChild(ky);
    card.addEventListener('click', ()=> select(i));
    roster.appendChild(card); cards.push(card);
  });

  let selected = 1; // Capitán México por defecto

  let camX = 0, lives = 3, coins = 0, robots = [], zaps = [], particles = [];

  sndBtn.addEventListener('click', function(e){ e.stopPropagation(); ensureAudio(); const on=!musicOn; musicOn=on; sfxOn=on; sndBtn.textContent=on?'🔊':'🔇'; });

  function select(i){ selected=i; cards.forEach((c,k)=>c.classList.toggle('active',k===i)); nowPlaying.textContent='JUGANDO: '+CHARS[i].name; }
  function doJump(){ jumpQueued = true; }

  function startZone(i){
    zoneIdx=i; camX=0; hero.worldX=120; hero.y=GROUND; hero.vy=0; hero.onGround=true; hero.facing=1;
    robots=[]; zaps=[]; particles=[]; landmarkReached=false;
    const Z=ZONES[i]; const n = 4 + i*2;
    for(let k=0;k<n;k++){ spawnRobot(500 + k*(Z.len-800)/n + Math.random()*120, i); }
  }

  function spawnRobot(wx, tier){
    const pal = [
      {b:'#c0392b',g:'#ff6a4d',e:'#ffd24d'}, // rojo
      {b:'#2467c0',g:'#5aa6ff',e:'#9fe6ff'}, // azul
      {b:'#7a37c0',g:'#c58cff',e:'#e6c8ff'}  // morado
    ][Math.floor(Math.random()*3)];
    const Z=ZONES[zoneIdx];
    robots.push({ worldX:wx, y:GROUND, hp:1+tier, t:Math.random()*6, pal,
      bub: Z.bubbles[Math.floor(Math.random()*Z.bubbles.length)], dead:false, hit:0 });
  }

  /* robot pixel-art (rejilla 16x24) */
  function drawRobot(g, o, sx){
    const s=4.4, GH=24, P=o.pal;
    g.save(); g.translate(sx, o.y); g.scale(-1,1);
    const bob=Math.sin(o.t*3)*1.4;
    function R(x,y,w,h,c){ g.fillStyle=c; g.fillRect(Math.round((x-8)*s), Math.round((y-GH)*s+bob), Math.ceil(w*s), Math.ceil(h*s)); }
    const D='#20242e', M='#3a4150', L='#5a6474';
    // piernas
    R(5,18,2,6,D); R(9,18,2,6,D); R(4,23,3,1,'#12151b'); R(9,23,3,1,'#12151b');
    // torso
    R(4,9,8,9,M); R(4,9,8,1,L); R(3,10,1,6,D); R(12,10,1,6,D);
    R(6,11,4,3,P.b); R(7,12,2,1,P.g); // núcleo brillante
    // brazos
    R(2,10,2,6,M); R(12,10,2,6,M); R(2,15,2,2,P.b); R(12,15,2,2,P.b);
    // cabeza
    R(5,3,6,6,M); R(5,3,6,1,L); R(4,4,1,4,D); R(11,4,1,4,D);
    R(6,5,4,2,'#0a0d12'); R(6+ (o.hit>0?0:1),5,2,2,P.e); // ojo/visor brillante
    R(7,2,2,1,P.g); R(6,1,1,1,P.g); R(9,1,1,1,P.g); // antenas
    if(o.hit>0){ g.globalAlpha=0.5; R(4,3,8,15,'#ffffff'); g.globalAlpha=1; }
    g.restore();
  }

  /* ============ PALANCA ============ */
  const jbase=document.getElementById('joybase'), jknob=document.getElementById('joyknob');
  let jActive=false, jRect=null; const TRAVEL=30;
  function setKnob(dx,dy){ jknob.style.transform=`translate(${dx*TRAVEL}px, ${dy*TRAVEL}px)`; }
  function moveKnob(e){
    const cx=jRect.left+jRect.width/2, cy=jRect.top+jRect.height/2;
    let dx=(e.clientX-cx)/(jRect.width/2), dy=(e.clientY-cy)/(jRect.height/2);
    const m=Math.hypot(dx,dy); if(m>1){ dx/=m; dy/=m; }
    input.dx=dx; setKnob(dx,dy); if(dy<-0.6 && hero.onGround) doJump();
  }
  jbase.addEventListener('pointerdown', e=>{ jActive=true; jRect=jbase.getBoundingClientRect(); jbase.setPointerCapture(e.pointerId); moveKnob(e); });
  jbase.addEventListener('pointermove', e=>{ if(jActive) moveKnob(e); });
  function endStick(){ if(!jActive) return; jActive=false; input.dx=0; setKnob(0,0); }
  jbase.addEventListener('pointerup', endStick); jbase.addEventListener('pointercancel', endStick); window.addEventListener('pointerup', endStick);

  document.getElementById('jumpBtn').addEventListener('click', ()=>{ if(hero.onGround) doJump(); });
  function punch(){
    if(comicOpen||win) return;
    hero.punch=0.18;
    const reach=80; let best=null,bd=1e9;
    for(const o of robots){ if(o.dead) continue; const dx=(o.worldX-hero.worldX)*hero.facing; if(dx>-12 && dx<reach){ const d=Math.abs(dx); if(d<bd){ bd=d; best=o; } } }
    if(best){ zapRobot(best); best.worldX += hero.facing*18; }
  }
  document.getElementById('atkBtn').addEventListener('click', punch);

  window.addEventListener('keydown', e=>{
    const k=e.key;
    if(k==='ArrowLeft'||k==='a'||k==='A'){ input.dx=-1; }
    else if(k==='ArrowRight'||k==='d'||k==='D'){ input.dx=1; }
    else if(k==='ArrowUp'||k===' '||k==='w'||k==='W'){ if(hero.onGround) doJump(); e.preventDefault(); }
    else if(k==='x'||k==='X'||k==='Enter'){ punch(); }
    else if(k==='1'){ select(0);} else if(k==='2'){ select(1);} else if(k==='3'){ select(2);}
    else if(k==='Escape' && comicOpen){ closeComic(); }
  });
  window.addEventListener('keyup', e=>{ if(['ArrowLeft','ArrowRight','a','A','d','D'].includes(e.key)) input.dx=0; });

  /* TOCAR ROBOT = zap */
  cv.addEventListener('pointerdown', e=>{
    if(comicOpen) return;
    const r=cv.getBoundingClientRect(); const mx=(e.clientX-r.left)*(W/r.width), my=(e.clientY-r.top)*(H/r.height);
    let best=null, bd=44;
    for(const o of robots){ if(o.dead) continue; const sx=o.worldX-camX; const d=Math.hypot(mx-sx, my-(GROUND-40)); if(d<bd){ bd=d; best=o; } }
    if(best){ zapRobot(best); }
  });
  function zapRobot(o){
    zaps.push({x:o.worldX, y:GROUND-42, life:0.18});
    o.hp--; o.hit=0.16; sfx('hit');
    if(o.hp<=0){ o.dead=true; coins++; sfx('defeat'); sfx('coin'); for(let i=0;i<10;i++) particles.push({x:o.worldX, y:GROUND-40, vx:(Math.random()-.5)*120, vy:-Math.random()*160-40, life:0.6, c:o.pal.g}); }
  }

  /* ============ FONDOS DIBUJADOS ============ */
  function sky(t){
    const Z=ZONES[zoneIdx], grd=ctx.createLinearGradient(0,0,0,GROUND+12);
    if(Z.sky==='night'){ grd.addColorStop(0,'#140a2e'); grd.addColorStop(.6,'#241147'); grd.addColorStop(1,'#3a1c3a'); }
    else if(Z.sky==='dusk'){ grd.addColorStop(0,'#20204d'); grd.addColorStop(.5,'#7a3a6a'); grd.addColorStop(1,'#e0763a'); }
    else { grd.addColorStop(0,'#1e6fd0'); grd.addColorStop(.6,'#5aa6e6'); grd.addColorStop(1,'#c9e2f2'); }
    ctx.fillStyle=grd; ctx.fillRect(0,0,W,GROUND+12);
    if(Z.sky==='night'){ ctx.fillStyle='rgba(255,255,255,.8)'; for(const st of STARS){ ctx.globalAlpha=.4+.6*Math.sin(t*2+st.p); ctx.fillRect(st.x,st.y,st.s,st.s);} ctx.globalAlpha=1;
      ctx.fillStyle='#f5f0d0'; ctx.beginPath(); ctx.arc(90,60,26,0,Math.PI*2); ctx.fill(); ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(80,54,24,0,Math.PI*2); ctx.fill(); }
    else if(Z.sky==='day'){ ctx.fillStyle='#fff6c8'; ctx.beginPath(); ctx.arc(W-90,64,30,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.85)'; for(const c of CLOUDS){ const x=((c.x - camX*0.15)%(W+140)+ (W+140))%(W+140)-70; blob(x,c.y,c.s); } }
    else { ctx.fillStyle='rgba(255,220,180,.5)'; ctx.beginPath(); ctx.arc(120,70,34,0,Math.PI*2); ctx.fill(); }
  }
  function blob(x,y,s){ ctx.beginPath(); ctx.arc(x,y,s,0,Math.PI*2); ctx.arc(x+s,y+3,s*0.8,0,Math.PI*2); ctx.arc(x-s,y+3,s*0.8,0,Math.PI*2); ctx.fill(); }
  const STARS=Array.from({length:46},()=>({x:Math.random()*W,y:Math.random()*150,s:Math.random()<.5?1:2,p:Math.random()*6.28}));
  const CLOUDS=Array.from({length:5},()=>({x:Math.random()*(W+140),y:30+Math.random()*70,s:12+Math.random()*10}));

  // estructura repetida por zona (parallax medio)
  function structures(){
    const Z=ZONES[zoneIdx];
    if(zoneIdx===0) tepito();
    else if(zoneIdx===1) angel();
    else piramides();
  }
  function tepito(){
    // cerros lejanos
    ctx.fillStyle='#2a1638'; for(let i=-1;i<9;i++){ const x=i*90-(camX*0.25)%90; hill(x,GROUND-40,70,34);}
    // edificios + puestos (tianguis) con lonas de colores
    const off=(camX*0.6);
    for(let i=-1;i<12;i++){
      const bx=i*140 - off%140;
      // edificio
      const bh=70+((i*53)%60); ctx.fillStyle= i%2? '#2c2140':'#241a33'; ctx.fillRect(bx, GROUND-bh, 96, bh);
      ctx.fillStyle='rgba(0,229,255,.5)'; for(let wy=0;wy<bh-16;wy+=14){ for(let wx=0;wx<80;wx+=18){ if((i+wx+wy)%3) ctx.fillRect(bx+8+wx, GROUND-bh+8+wy, 8, 7);} }
      // neón
      ctx.fillStyle= i%3? '#ff2e88':'#ffcf1a'; ctx.fillRect(bx+10, GROUND-bh-6, 44, 4);
    }
    // lonas del tianguis (más cerca)
    const off2=(camX*0.85);
    for(let i=-1;i<16;i++){
      const sx=i*96 - off2%96; const col=['#e0342a','#1f9e4d','#2467c0','#ffcf1a','#ff2e88'][i%5];
      ctx.fillStyle=col; ctx.fillRect(sx, GROUND-56, 84, 12); // lona
      ctx.fillStyle='#5a4632'; ctx.fillRect(sx+6, GROUND-56, 4, 42); ctx.fillRect(sx+74, GROUND-56, 4, 42); // postes
      ctx.fillStyle='rgba(0,0,0,.22)'; ctx.fillRect(sx, GROUND-14, 84, 14); // mesa/sombra
    }
  }
  function angel(){
    // avenida reforma: edificios altos
    const off=(camX*0.5);
    for(let i=-1;i<11;i++){ const bx=i*150-off%150; const bh=90+((i*71)%80); ctx.fillStyle=i%2?'#3a3f66':'#2e335a'; ctx.fillRect(bx,GROUND-bh,110,bh);
      ctx.fillStyle='rgba(255,220,120,.55)'; for(let wy=0;wy<bh-18;wy+=16){for(let wx=0;wx<92;wx+=20){ if((i+wy)%2) ctx.fillRect(bx+9+wx,GROUND-bh+10+wy,10,8);} } }
    // EL ÁNGEL: columna dorada con estatua alada, fija en el centro del recorrido de la zona
    const angelWorld=1150; const ax=angelWorld-camX;
    if(ax>-80 && ax<W+80){
      ctx.fillStyle='#e8e2d0'; ctx.fillRect(ax-22,GROUND-30,44,30); // base
      ctx.fillStyle='#d8d2c0'; ctx.fillRect(ax-30,GROUND-8,60,8);
      ctx.fillStyle='#efe6c2'; ctx.fillRect(ax-7,GROUND-150,14,120); // columna
      ctx.fillStyle='#f6d24a'; ctx.beginPath(); ctx.arc(ax,GROUND-168,11,0,Math.PI*2); ctx.fill(); // ángel cuerpo
      ctx.fillStyle='#ffe680'; ctx.fillRect(ax-2,GROUND-182,4,10);
      ctx.beginPath(); ctx.moveTo(ax,GROUND-172); ctx.lineTo(ax-22,GROUND-186); ctx.lineTo(ax-6,GROUND-166); ctx.fill(); // ala
      ctx.beginPath(); ctx.moveTo(ax,GROUND-172); ctx.lineTo(ax+22,GROUND-186); ctx.lineTo(ax+6,GROUND-166); ctx.fill();
      ctx.strokeStyle='rgba(255,207,26,.5)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(ax,GROUND-168,20,0,Math.PI*2); ctx.stroke();
    }
    // camellón con arbolitos
    const off2=(camX*0.9);
    for(let i=-1;i<14;i++){ const tx=i*110-off2%110; ctx.fillStyle='#5a3a22'; ctx.fillRect(tx,GROUND-26,5,26); ctx.fillStyle='#1f9e4d'; ctx.beginPath(); ctx.arc(tx+2,GROUND-32,12,0,Math.PI*2); ctx.fill(); }
  }
  function piramides(){
    // cerros
    ctx.fillStyle='#8a6a3a'; for(let i=-1;i<8;i++){ const x=i*130-(camX*0.3)%130; hill(x,GROUND-30,110,40);}
    // pirámides escalonadas (Sol y Luna) fijas
    stepPyramid(900-camX, 150, '#b08040'); // grande
    stepPyramid(1700-camX, 110, '#9c6f36');
    // nopales cercanos
    const off2=(camX*0.9);
    for(let i=-1;i<16;i++){ const nx=i*100-off2%100; ctx.fillStyle='#1c7a3a'; ctx.fillRect(nx,GROUND-30,8,30); ctx.fillRect(nx-8,GROUND-24,8,6); ctx.fillRect(nx+8,GROUND-20,8,6); ctx.fillStyle='#12351b'; }
  }
  function stepPyramid(cx,ph,col){ if(cx<-260||cx>W+260) return; const steps=6; for(let s=0;s<steps;s++){ const w=220*(1-s/steps); const h=ph/steps; ctx.fillStyle= s%2?col:'#c79552'; ctx.fillRect(cx-w/2, GROUND-h*(s+1), w, h); } ctx.fillStyle='rgba(0,0,0,.15)'; ctx.fillRect(cx-8,GROUND-ph,16,ph); }
  function hill(x,y,w,h){ ctx.beginPath(); ctx.moveTo(x,GROUND+12); ctx.quadraticCurveTo(x+w/2,y,x+w,GROUND+12); ctx.fill(); }

  function ground(){
    const Z=ZONES[zoneIdx];
    ctx.fillStyle= zoneIdx===2 ? '#c9a066' : (zoneIdx===1?'#2b2b3a':'#241a2c'); ctx.fillRect(0,GROUND+12,W,H-GROUND-12);
    ctx.fillStyle='rgba(0,0,0,.25)'; ctx.fillRect(0,GROUND+12,W,4);
    ctx.fillStyle='rgba(255,255,255,.06)'; const off=camX%40; for(let x=-off;x<W;x+=40){ ctx.fillRect(x,GROUND+26,20,3); }
  }

  function drawSpotlight(x){ const g=ctx.createRadialGradient(x,GROUND,4,x,GROUND,80); g.addColorStop(0,'rgba(255,207,26,.22)'); g.addColorStop(1,'rgba(255,207,26,0)'); ctx.fillStyle=g; ctx.beginPath(); ctx.ellipse(x,GROUND+6,58,14,0,0,Math.PI*2); ctx.fill(); }

  function speech(x,y,txt,boss){
    ctx.font='7px "Press Start 2P", monospace'; const w=Math.min(150, ctx.measureText(txt).width+14);
    ctx.fillStyle= boss?'rgba(224,52,42,.92)':'rgba(255,255,255,.92)'; roundRect(x-w/2,y-20,w,16,4); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x-4,y-4); ctx.lineTo(x+4,y-4); ctx.lineTo(x,y+2); ctx.fill();
    ctx.fillStyle= boss?'#fff':'#201030'; ctx.textAlign='center'; ctx.fillText(txt, x, y-9); ctx.textAlign='left';
  }
  function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

  function hud(){
    ctx.font='9px "Press Start 2P", monospace'; ctx.textAlign='left';
    ctx.fillStyle='#e0342a'; ctx.fillText('❤'.repeat(Math.max(0,lives)), 12, 22);
    ctx.fillStyle='#ffcf1a'; ctx.fillText('★ '+coins, 12, 40);
    ctx.textAlign='right'; ctx.fillStyle='#fff'; ctx.fillText(ZONES[zoneIdx].name, W-12, 22);
    const rem=robots.filter(r=>!r.dead).length;
    ctx.fillStyle= rem? '#9fe6ff':'#7ef0a6'; ctx.fillText(rem? ('ROBOTS: '+rem):'¡ZONA LIBRE! →', W-12, 40);
    ctx.textAlign='left';
    // barra de avance
    const p=Math.min(1, hero.worldX/ZONES[zoneIdx].len); ctx.fillStyle='rgba(255,255,255,.2)'; ctx.fillRect(W/2-80,10,160,5);
    ctx.fillStyle='#1f9e4d'; ctx.fillRect(W/2-80,10,160*p,5);
  }

  /* ============ CÓMIC ============ */
  const comicEl=document.getElementById('comic'), comicImg=document.getElementById('comicImg'),
        comicTitle=document.getElementById('comicTitle'), comicDot=document.getElementById('comicDot');
  let comicPages=[], comicI=0;
  function openComic(){
    const Z=ZONES[zoneIdx]; comicPages=Z.comic.slice(); comicI=0; comicOpen=true;
    comicTitle.textContent=Z.comicTitle; showComicPage(); comicEl.classList.add('show'); sfx('comic');
  }
  function showComicPage(){ comicImg.src=comicPages[comicI]; comicDot.textContent=(comicI+1)+' / '+comicPages.length; }
  document.getElementById('comicNext').addEventListener('click', ()=>{ if(comicI<comicPages.length-1){ comicI++; showComicPage(); } else closeComic(); });
  document.getElementById('comicPrev').addEventListener('click', ()=>{ if(comicI>0){ comicI--; showComicPage(); } });
  function closeComic(){
    comicEl.classList.remove('show'); comicOpen=false;
    if(zoneIdx<ZONES.length-1){ startZone(zoneIdx+1); }
    else { win=true; sfx('win'); }
  }
  let win=false;

  /* ============ BUCLE ============ */
  let last=performance.now();
  function loop(now){
    const dt=Math.min(0.05,(now-last)/1000); last=now; const t=now/1000;

    if(!comicOpen && !win){
      // héroe
      hero.worldX += input.dx*SPEED*dt;
      hero.worldX = Math.max(60, Math.min(ZONES[zoneIdx].len, hero.worldX));
      if(input.dx>0.12) hero.facing=1; else if(input.dx<-0.12) hero.facing=-1;
      if(jumpQueued && hero.onGround){ hero.vy=-JUMP; hero.onGround=false; sfx('jump'); } jumpQueued=false;
      hero.vy+=GRAV*dt; hero.y+=hero.vy*dt; if(hero.y>=GROUND){ hero.y=GROUND; hero.vy=0; hero.onGround=true; }
      hero.moving=Math.abs(input.dx)>0.12 && hero.onGround; hero.walk+=dt*(hero.moving?12:0);
      if(hero.invuln>0) hero.invuln-=dt;
      if(hero.punch>0) hero.punch-=dt;
      // parpadeo
      hero.blink-=dt; if(hero.blink<=-0.12){ hero.nextBlink=2+Math.random()*3.5; hero.blink=hero.nextBlink; }
      const blinking = (hero.blink<0);

      // cámara
      camX = Math.max(0, Math.min(ZONES[zoneIdx].len-W, hero.worldX - W*0.4));

      // robots
      const remaining = robots.filter(r=>!r.dead).length;
      for(const o of robots){ if(o.dead) continue; o.t+=dt; if(o.hit>0) o.hit-=dt;
        const dir = Math.sign(hero.worldX-o.worldX);
        // se acercan al héroe
        o.worldX += dir*46*dt;
        // colisión con héroe
        if(Math.abs(o.worldX-hero.worldX)<30 && hero.invuln<=0){
          if(!hero.onGround){ zapRobot(o); hero.vy=-JUMP*0.5; } // salto encima = zap
          else { lives--; sfx('hurt'); hero.invuln=1.2; hero.worldX -= dir*40; if(lives<=0){ lives=0; } }
        }
      }
      // checkpoint: zona libre + llegar al final → cómic
      if(remaining===0 && hero.worldX>=ZONES[zoneIdx].len-40 && !landmarkReached){ landmarkReached=true; openComic(); }

      // efectos
      for(const z of zaps){ z.life-=dt; } zaps=zaps.filter(z=>z.life>0);
      for(const p of particles){ p.life-=dt; p.vy+=500*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; } particles=particles.filter(p=>p.life>0);
      if(lives<=0){ /* reinicia zona */ lives=3; startZone(zoneIdx); }
    }

    // ====== RENDER ======
    ctx.clearRect(0,0,W,H);
    sky(t); structures(); ground();

    // zaps
    for(const z of zaps){ const sx=z.x-camX; ctx.strokeStyle='rgba(0,229,255,'+(z.life/0.18)+')'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(sx-10,z.y-10); ctx.lineTo(sx,z.y); ctx.lineTo(sx-6,z.y+4); ctx.lineTo(sx+10,z.y+12); ctx.stroke(); }

    // robots (ordenados por profundidad simple)
    const rs=robots.filter(r=>!r.dead).sort((a,b)=>a.y-b.y);
    for(const o of rs){ const sx=o.worldX-camX; if(sx<-60||sx>W+60) continue; drawSpotlight(sx); drawRobot(ctx,o,sx);
      if(Math.abs(o.worldX-hero.worldX)<230 && Math.random()<0.9) speech(sx, GROUND-64, o.bub, o.hp>1); }

    // héroe
    const hsx=hero.worldX-camX;
    drawSpotlight(hsx);
    // aura seleccionado + flechita
    ctx.strokeStyle='rgba(31,158,77,.9)'; ctx.lineWidth=2; ctx.beginPath(); ctx.ellipse(hsx,GROUND+6,36,10,0,0,Math.PI*2); ctx.stroke();
    if(hero.invuln<=0 || Math.floor(t*10)%2){
      drawChar(ctx, CHARS[selected].parts, hsx, hero.y, 5, hero.facing, t, hero.walk, hero.moving, (hero.blink<0));
    }
    if(hero.punch>0){ const a=hero.punch/0.18, px=hsx+hero.facing*30, py=hero.y-46;
      ctx.save(); ctx.translate(px,py); ctx.globalAlpha=a; ctx.fillStyle='#ffcf1a'; ctx.strokeStyle='#e0342a'; ctx.lineWidth=2;
      ctx.beginPath(); for(let i=0;i<10;i++){ const ang=i/10*Math.PI*2, r=(i%2?6:14)*(0.6+0.4*a); ctx.lineTo(Math.cos(ang)*r, Math.sin(ang)*r);} ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle='#3a0016'; ctx.font='7px "Press Start 2P", monospace'; ctx.textAlign='center'; ctx.fillText('POW', 0, 2); ctx.textAlign='left'; ctx.globalAlpha=1; ctx.restore(); }

    // partículas
    for(const p of particles){ ctx.globalAlpha=Math.max(0,p.life/0.6); ctx.fillStyle=p.c; ctx.fillRect(p.x-camX-2,p.y-2,4,4); } ctx.globalAlpha=1;

    hud();

    // final
    if(win){ ctx.fillStyle='rgba(4,2,10,.7)'; ctx.fillRect(0,0,W,H);
      ctx.textAlign='center'; ctx.fillStyle='#ffcf1a'; ctx.font='16px "Press Start 2P", monospace'; ctx.fillText('¡MÉXICO A SALVO!', W/2, H/2-10);
      ctx.fillStyle='#7ef0a6'; ctx.font='8px "Press Start 2P", monospace'; ctx.fillText('Los robots fueron repelidos · ★ '+coins, W/2, H/2+16);
      ctx.fillStyle='#9fe6ff'; ctx.fillText('Recarga para jugar otra vez', W/2, H/2+40); ctx.textAlign='left'; }

    requestAnimationFrame(loop);
  }

  startZone(0);
  requestAnimationFrame(loop);
})();
</script>
<script>
(function(){
  var cab=document.querySelector('.cabinet');
  function fit(){
    cab.style.transform='none'; cab.style.marginBottom='';
    if(window.innerWidth<768) return;              // en movil se deja el flujo normal
    var w=cab.offsetWidth, h=cab.offsetHeight;
    var s=Math.min(1,(window.innerHeight-18)/h,(window.innerWidth-16)/w);
    if(s>=1) return;                               // si ya cabe, no escalar
    cab.style.transformOrigin='top center';
    cab.style.transform='scale('+s+')';
    cab.style.marginBottom=(-(h*(1-s)))+'px';      // compensa el espacio sobrante
  }
  window.addEventListener('resize',fit);
  window.addEventListener('load',fit);
  fit();
})();
</script>
</body>
</html>
